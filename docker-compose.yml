services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: bn-monitor-timescaledb
    environment:
      POSTGRES_DB: bn_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bn_monitor"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  timescaledb-data:

